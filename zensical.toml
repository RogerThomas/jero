[project]
site_name = "jero"
repo_url = "https://github.com/RogerThomas/jero"
site_url = "https://RogerThomas.github.io/jero"
site_description = "An opinionated, msgspec-first ASGI micro-framework"
site_author = "Roger Thomas"
edit_uri = "edit/main/docs/"
repo_name = "RogerThomas/jero"
copyright = 'Maintained by <a href="https://RogerThomas.com">RogerThomas</a>.'

nav = [
    { "Home" = "index.md" },
    { "Getting Started" = "getting-started.md" },
    { "Guide" = [
        { "Resources & Endpoints" = "guide/resources.md" },
        { "Request binding" = "guide/binding.md" },
        { "Responses & headers" = "guide/responses.md" },
        { "Links & Location" = "guide/links-and-location.md" },
        { "Streaming" = "guide/streaming.md" },
        { "Background tasks" = "guide/background-tasks.md" },
        { "Forms & uploads" = "guide/forms.md" },
        { "Authentication" = "guide/auth.md" },
        { "Wiring & lifecycle" = "guide/wiring.md" },
        { "Testing" = "guide/testing.md" },
        { "REST & error semantics" = "guide/rest.md" },
    ] },
    { "Performance" = "performance.md" },
    { "API Reference" = "modules.md" },
]

[project.plugins.mkdocstrings.handlers.python]
paths = ["jero"]

[project.theme]
language = "en"
logo = "assets/jero-favicon.png"
favicon = "assets/jero-favicon.png"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.prune",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]


[project.theme.icon]
previous = "fontawesome/solid/angle-left"
next = "fontawesome/solid/angle-right"
repo = "fontawesome/brands/github"

#[project.theme.font]
#text = "Inter"
#code = "Jetbrains Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "white"
accent = "deep orange"
toggle.icon =  "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "deep orange"
toggle.icon =  "material/brightness-4"
toggle.name = "Switch to system preference"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/RogerThomas/jero"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/jero"

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.toc]
permalink = true
