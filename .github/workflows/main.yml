name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run checks
        run: |
          uv lock --locked
          uv run prek run -a

  tests-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run python -m pytest tests --cov --cov-config=pyproject.toml --cov-report=xml

      - name: Check typing
        run: uv run pyrefly check

      # Upload from every matrix version so Codecov merges them: version-gated branches
      # (the `sys.version_info` split in `instantiate_factory`) are each covered by the
      # interpreter that actually runs them, and the union is fully covered.
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Type-check the public interface (./tests and ./demo_app exercise jero's public API)
  # with every major type checker. pyrefly is the project's primary checker (run in
  # `quality`); this guards against the public surface tripping up any of the others.
  # CI-only.
  type-check-public-interface:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        checker: [mypy, ty, pyright, zuban]
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: ${{ matrix.checker }} on the public interface (./tests, ./demo_app)
        run: |
          case "${{ matrix.checker }}" in
            mypy)    uv run mypy tests demo_app ;;
            ty)      uv run ty check tests demo_app ;;
            pyright) uv run pyright tests demo_app ;;
            zuban)   uv run zuban check tests demo_app ;;
          esac

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Check if documentation can be built
        run: |
          uv run zensical build -s
          uv run yeet ./scripts/build_agent_docs.py
