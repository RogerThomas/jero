name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run checks
        run: |
          uv lock --locked
          uv run prek run -a

  tests-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run python -m pytest tests --cov --cov-config=pyproject.toml --cov-report=xml

      - name: Check typing
        run: uv run pyrefly check

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        if: ${{ matrix.python-version == '3.14' }}
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Type-check the public interface (./tests exercises jero's public API) with every
  # major type checker. pyrefly is the project's primary checker (run in `quality`);
  # this guards against the public surface tripping up any of the others. CI-only.
  type-check-public-interface:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        checker: [mypy, ty, pyright, zuban]
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: ${{ matrix.checker }} on the public interface (./tests)
        run: |
          case "${{ matrix.checker }}" in
            mypy)    uv run mypy tests ;;
            ty)      uv run ty check tests ;;
            pyright) uv run pyright tests ;;
            zuban)   uv run zuban check tests ;;
          esac

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Check if documentation can be built
        run: |
          uv run zensical build -s
          uv run yeet ./scripts/build_agent_docs.py
