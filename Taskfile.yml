# https://taskfile.dev

version: '3'

vars:
  PYTEST_PROFILE: '{{default "dev" .PYTEST_PROFILE}}'
  PYTEST_ARGS_DEV: -s -vv -rA --tb=short --color=yes
  PYTEST_ARGS_AGENT: -x -q --tb=short --no-header --disable-warnings --color=no -p no:cacheprovider
  PYTEST_ARGS: '{{if eq .PYTEST_PROFILE "agent"}}{{.PYTEST_ARGS_AGENT}}{{else}}{{.PYTEST_ARGS_DEV}}{{end}}'
  PYTEST_RUN: uv run pytest {{.PYTEST_ARGS}}

tasks:
  install:
    desc: Install the virtual environment and the pre-commit hooks
    cmds:
      - uv sync --all-groups
      - uv run prek install

  check:
    desc: 'Run code quality tools: lock check + prek (ruff, pyrefly, deptry, pylint)'
    cmds:
      - uv lock --locked
      - uv run prek run -a

  test:
    desc: 'Run the test suite with coverage. PYTEST_PROFILE=agent|dev selects output verbosity.'
    cmd: '{{.PYTEST_RUN}} --cov --cov-config=pyproject.toml --cov-report=xml {{.CLI_ARGS}}'

  test-one:
    desc: 'Run a single test in isolation. Usage: task test-one -- tests/test_streaming.py::test_x'
    cmd: '{{.PYTEST_RUN}} {{.CLI_ARGS}}'

  pyrefly:
    desc: Static type checking
    cmd: uv run pyrefly check

  typecheck-tests:
    desc: 'Type-check the public interface (./tests and ./demo_app) with mypy, ty, pyright & zuban. Runs all, fails if any do. pyrefly is the primary project checker.'
    cmd: |
      set -u
      rc=0
      for tool in "mypy tests demo_app" "ty check tests demo_app" "pyright tests demo_app" "zuban check tests demo_app"; do
        echo "──── uv run ${tool} ────"
        uv run ${tool} || rc=1
      done
      exit ${rc}

  ruff:
    desc: Lint and auto-fix
    cmd: uv run ruff check --fix --unsafe-fixes .

  pylint:
    desc: Run pylint
    cmd: uv run pylint jero tests demo_app

  deptry:
    desc: Check for dependency issues
    cmd: uv run deptry .

  prek:
    desc: Run the pre-commit hooks
    cmd: uv run prek run {{default "-a" .CLI_ARGS}}

  clean-build:
    desc: Remove build artifacts
    cmd: rm -rf dist

  build:
    desc: Build the wheel
    cmds:
      - task: clean-build
      - uv build

  publish:
    desc: Publish a release to PyPI
    cmd: uv publish

  build-and-publish:
    desc: Build and publish
    cmds:
      - task: build
      - task: publish

  release:
    desc: 'Bump the version and cut a GitHub release (defaults to patch). Usage: task release [-- major|minor|patch]'
    cmds:
      - |
        set -eu
        bump="{{.CLI_ARGS}}"
        bump="${bump:-patch}"
        case "$bump" in
          major|minor|patch) ;;
          *) echo "usage: task release -- major|minor|patch" >&2; exit 1 ;;
        esac
        if [ -n "$(git status --porcelain)" ]; then
          echo "working tree is not clean — commit or stash changes before releasing" >&2
          exit 1
        fi
        uv version --bump "$bump"
        uv lock
        version="$(uv version --short)"
        git commit -am "release $version"
        git push
        gh release create "$version" --target main --title "$version" --generate-notes

  docs:
    desc: Build and serve the documentation
    cmd: uv run zensical serve

  docs-test:
    desc: Build the documentation strictly (fail on warnings)
    cmds:
      - uv run zensical build -s
      - uv run yeet ./scripts/build_agent_docs.py
